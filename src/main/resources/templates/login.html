<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录页面</title>
<!--    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">-->
    <link rel="stylesheet" th:href="@{/css/tailwind.min.css}">
    <style>
        /* 自定义样式 */
        .gradient-bg {
            background-image: linear-gradient(to bottom, #6366f1, #7c3aed);
        }
        .logo {
            width: 100px;
        }
    </style>
</head>
<body class="bg-gray-100">
<div class="min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full bg-white shadow-lg rounded-lg p-8">
<!--        <img src="https://via.placeholder.com/100x100?text=Logo" alt="Logo" class="logo mx-auto mb-4">-->
        <h2 class="text-2xl font-bold mb-4 text-center">欢迎登录</h2>
        <form th:action="@{/login}" method="post">
            <div class="mb-4">
                <label for="username" class="block text-gray-700 text-sm font-bold mb-2">用户名</label>
                <input type="text" id="username" name="username" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" placeholder="请输入用户名">
            </div>
            <div class="mb-6">
                <label for="password" class="block text-gray-700 text-sm font-bold mb-2">密码</label>
                <input type="password" id="password" name="password" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 mb-3 leading-tight focus:outline-none focus:shadow-outline" placeholder="请输入密码">
                <p class="text-red-500 text-xs italic">请检查您的用户名和密码。</p>
            </div>
            <div class="flex items-center justify-between">
                <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline">
                    登录
                </button>
<!--                <a class="inline-block align-baseline font-bold text-sm text-blue-500 hover:text-blue-800" href="#">-->
<!--                    忘记密码?-->
<!--                </a>-->
            </div>
        </form>
    </div>
</div>
</body>
</html>
