<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>支付宝重定向</title>
  </head>
  <body>
<!--    <h1>正在跳转支付宝</h1>-->
<!--    <p id="message">检测设备中，请稍候...</p>-->
<!--    <p>订单编号:<span th:text="${orderId}"></span></p>-->
<!--    <p>回调地址:<span th:text="${redirectUrl}"></span></p>-->
    <h1 th:text="${order.produceDesc}"></h1>
    <p>订单编号:<span th:text="${order.orderNo}"></span></p>
    <p>订单金额:<span th:text="${order.amount}"></span></p>
    <button id="errorPay" style="background-color:red">付款遇到问题</button>
    <button id="successPay">付款完成</button>
    <script>

      // 监听付款遇到问题重新发起付款
      document.getElementById('errorPay').addEventListener('click', function () {
        // 调用支付宝JSAPI关闭页面
        var alipayUrl =
                "https://openauth.alipay.com/oauth2/publicAppAuthorize.htm?app_id=2021004137638718&scope=auth_user&" +
                "&state="+ encodeURIComponent("[[${order.payNo}]]") + "&redirect_uri=[[${redirectUrl}]]";
        var alipayAuthCodeUrl =
                "alipays://platformapi/startapp?appId=20000067&url=" +
                encodeURIComponent(alipayUrl);
        window.location.href = alipayAuthCodeUrl;
      });
      // 监听付款遇到问题重新发起付款
      document.getElementById('successPay').addEventListener('click', function () {
        window.location.href = "[[${order.returnUrl}]]";
      });

      document.addEventListener("DOMContentLoaded", function () {
        function isMobileDevice() {
          return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(
            navigator.userAgent
          );
        }

        function redirectToAlipay() {
          var alipayUrl =
            "https://openauth.alipay.com/oauth2/publicAppAuthorize.htm?app_id=2021004137638718&scope=auth_user&" +
              "&state="+ encodeURIComponent("[[${order.payNo}]]") + "&redirect_uri=[[${redirectUrl}]]";
          var alipayAuthCodeUrl =
            "alipays://platformapi/startapp?appId=20000067&url=" +
            encodeURIComponent(alipayUrl);
          var downloadUrl = "https://www.alipay.com/";

          var isAndroid = /Android/i.test(navigator.userAgent);
          var isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

          if (isMobileDevice()) {
            // 尝试打开支付宝客户端
            window.location.href = alipayAuthCodeUrl;
            setTimeout(function () {
              // 如果5秒后还在当前页面，引导用户手动操作或下载支付宝
              if (!document.hidden) {
                if (isAndroid || isIOS) {
                  document.getElementById("message").innerHTML =
                    '如果未自动打开支付宝，请<a href="' +
                    alipayUrl +
                    '">点击这里</a>或<a href="' + downloadUrl +
                          '">下载支付宝APP。</a>';
                } else {
                  window.location.href = downloadUrl; // 非移动设备或无法识别设备，跳转到下载页
                }
              }
            }, 5000);
          } else {
            // 非移动设备，提供下载链接
            document.getElementById("message").innerHTML =
              '请在移动设备上访问本页面，或<a href="' + downloadUrl +
              '">下载支付宝APP</a>。';
          }
        }

        redirectToAlipay();
      });
    </script>
  </body>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin-top: 20vh;
    }
    h1 {
        color: #333;
    }
    p {
        color: #666;
    }
    a {
        color: #007bff;
        text-decoration: none;
    }
    a:hover {
        text-decoration: underline;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 10px 20px;
      cursor: pointer;
      margin-top: 20px;
    }
</style>
</html>
