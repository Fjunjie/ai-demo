<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>支付宝转账</title>
</head>
<body>
<h2>支付宝转账</h2>
<p>即将跳转至支付宝转账页面...</p>
<!-- 实际应用中，此处应使用JavaScript动态构建并执行跳转逻辑 -->
<div th:if="${payUrl}">
    <p>转账信息预览:</p>
    <ul>
        <li>付款方账号：<span th:text="${user}"></span></li>
        <li>订单号: <span th:text="${outBizNo}"></span></li>
        <li>金额: <span th:text="${order.amount}"></span></li>
        <li>收款账户: <span th:text="${payeeAccount}"></span></li>
        <li>付款方显示名称: <span th:text="${payerShowName}"></span></li>
        <li>收款方真实姓名: <span th:text="${payeeRealName}"></span></li>
        <li>备注: <span th:text="${remark}"></span></li>
    </ul>
</div>
<div th:if="${authUrl}">
    <p>用户未授权，请完成授权以后再尝试支付</p>
</div>
<!-- 以下为示例跳转逻辑，实际应用中需替换为支付宝API调用逻辑 -->
<script th:inline="javascript">
    var redirectUrl = [[${redirectUrl}]];
    // 使用后端生成的带有签名的URL进行跳转
    if (redirectUrl) {
        window.location.href = redirectUrl;
    } else {
        console.error("缺少有效的签名URL，无法进行跳转");
    }
</script>
</body>
</html>
